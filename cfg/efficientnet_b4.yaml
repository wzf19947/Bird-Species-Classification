#{'url': 'https://github.com/rwightman/pytorch-image-models/releases/download/v0.1-weights/tf_efficientnet_b4_ns-d6313a46.pth', 'hf_hub_id': 'timm/tf_efficientnet_b4.ns_jft_in1k', 'architecture': 'tf_efficientnet_b4', 'tag': 'ns_jft_in1k', 'custom_load': False, 'input_size': (3, 380, 380), 'fixed_input_size': False, 'interpolation': 'bicubic', 'crop_pct': 0.922, 'crop_mode': 'center', 'mean': (0.485, 0.456, 0.406), 'std': (0.229, 0.224, 0.225), 'num_classes': 1000, 'pool_size': (12, 12), 'first_conv': 'conv_stem', 'classifier': 'classifier', 'license': 'apache-2.0'}

# 训练数据集，可支持多个数据集
train_data:
  - '/home/workspace/Feng/dataset_bird/inaturalist2021/train'

# 测试数据集
test_data: '/home/workspace/Feng/dataset_bird/inaturalist2021/val'

# 类别文件
class_name: '/home/workspace/Feng/dataset_bird/inaturalist2021/class_name.txt'

# 数据增强方法
train_transform: "train"
test_transform: "val"

# 工作目录
work_dir: "Birdmodel_inat_tf_efficientnet_b4_250316/"

# 网络配置
net_type: "tf_efficientnet_b4"  # 支持：resnet18/50, mobilenet_v2, googlenet, inception_v3
width_mult: 1.0

# 输入尺寸
# input_size: [380, 380]
input_size: [256, 256]

# 归一化参数
rgb_mean: [0.485, 0.456, 0.406]
rgb_std: [0.229, 0.224, 0.225]

# 训练参数
batch_size: 64
lr: 0.0003
optim_type: "AdamW"
loss_type: "CrossEntropyLoss"
momentum: 0.9
num_epochs: 120
num_warm_up: 5
num_workers: 8
weight_decay: 0.05
drop_rate: 0.25
drop_path_rate: 0.15
# 学习率调度
scheduler: "cosine"
# milestones: [30, 75]

# 新增配置项 (代码中会自动读取)
label_smoothing: 0.1    # 开启标签平滑

# GPU配置
gpu_id: [1]

# 日志配置
log_freq: 50
progress: True

# 预训练模型
pretrained: True
finetune: True