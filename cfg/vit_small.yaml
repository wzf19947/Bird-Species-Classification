# 训练数据集，可支持多个数据集
train_data:
  - '/home/workspace/Feng/dataset_bird/inaturalist2021/train'

# 测试数据集
test_data: '/home/workspace/Feng/dataset_bird/inaturalist2021/val'

# 类别文件
class_name: '/home/workspace/Feng/dataset_bird/inaturalist2021/class_name.txt'

# 数据增强方法
train_transform: "train"
test_transform: "val"

# 工作目录
work_dir: "Birdmodel_inat_vit_small_patch16_384_250316/"

# 网络配置
net_type: "vit_small_patch16_384"
width_mult: 1.0

# 输入尺寸
input_size: [384, 384]

# 归一化参数
rgb_mean: [0.5, 0.5, 0.5]
rgb_std: [0.5, 0.5, 0.5]
# rgb_mean: [0.485, 0.456, 0.406]
# rgb_std: [0.229, 0.224, 0.225]

# 训练参数
batch_size: 128
lr: 0.0005
optim_type: "AdamW"
loss_type: "CrossEntropyLoss"
momentum: 0.9
num_epochs: 150
num_warm_up: 10
num_workers: 8
weight_decay: 0.03
drop_rate: 0.3
drop_path_rate: 0.2
attn_drop_rate: 0.2

# 学习率调度
scheduler: "cosine"
# milestones: [50, 80]

# 新增配置项 (代码中会自动读取)
label_smoothing: 0.1    # 开启标签平滑

# GPU配置
gpu_id: [2]

# 日志配置
log_freq: 50
progress: True

# 预训练模型
pretrained: True
finetune: True