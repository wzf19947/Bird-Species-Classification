# 训练数据集，可支持多个数据集
train_data:
  - '/home/workspace/Feng/dataset_bird/inaturalist2021/train'

# 测试数据集
test_data: '/home/workspace/Feng/dataset_bird/inaturalist2021/val'

# 类别文件
class_name: '/home/workspace/Feng/dataset_bird/inaturalist2021/class_name.txt'

# 数据增强方法
train_transform: "train"
test_transform: "val"

# 工作目录
work_dir: "Birdmodel_inat_resnet152_250305/"

# 网络配置
net_type: "resnet152"  # 支持：resnet18/50, mobilenet_v2, googlenet, inception_v3
width_mult: 1.0

# 输入尺寸
input_size: [224, 224]

# 归一化参数
# rgb_mean: [0.5, 0.5, 0.5]
# rgb_std: [0.5, 0.5, 0.5]
rgb_mean: [0.485, 0.456, 0.406]
rgb_std: [0.229, 0.224, 0.225]

# 训练参数
batch_size: 32
lr: 0.01
optim_type: "SGD"
loss_type: "CrossEntropyLoss"
momentum: 0.9
num_epochs: 100
num_warn_up: 3
num_workers: 8
weight_decay: 0.0005

# 学习率调度
scheduler: "multi-step"
milestones: [30, 75]

# GPU配置
gpu_id: [1]

# 日志配置
log_freq: 50
progress: True

# 预训练模型
pretrained: True
finetune: True